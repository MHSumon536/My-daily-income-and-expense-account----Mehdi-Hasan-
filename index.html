<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>আমার হিসাব</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent: #fbbf24;
            --accent-hover: #f59e0b;
            --bg: #f8fafc;
            --white: #ffffff;
            --danger: #ef4444;
            --success: #10b981;
            --table-border: #e2e8f0;
            --info: #3b82f6;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 25px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 20px 40px -5px rgba(0, 0, 0, 0.1), 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        body { 
            font-family: 'Noto Sans Bengali', sans-serif; 
            background-color: var(--bg); 
            color: var(--primary);
            overflow-x: hidden;
            width: 100%;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Advanced Premium Loader --- */
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(248, 250, 252, 0.85); z-index: 9999;
            display: none; justify-content: center; align-items: center;
            flex-direction: column; color: var(--primary); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        .spinner {
            position: relative; width: 90px; height: 90px; margin-bottom: 30px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--accent);
            border-bottom-color: var(--accent);
            animation: premiumSpin 1.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.2);
        }
        .spinner:before {
            content: ''; position: absolute; top: 12px; left: 12px; right: 12px; bottom: 12px;
            border-radius: 50%; border: 3px solid transparent;
            border-left-color: var(--primary); border-right-color: var(--primary);
            animation: premiumSpin 1.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite reverse;
        }
        .spinner:after {
            content: ''; position: absolute; top: 26px; left: 26px; right: 26px; bottom: 26px;
            border-radius: 50%; border: 3px solid transparent;
            border-top-color: var(--info); border-bottom-color: var(--info);
            animation: premiumSpin 2s linear infinite;
        }
        @keyframes premiumSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #loaderText {
            background: linear-gradient(90deg, #0f172a, #fbbf24, #0f172a);
            background-size: 200% auto;
            color: #fff;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textShine 2s linear infinite;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        @keyframes textShine { to { background-position: 200% center; } }
        /* --- End Premium Loader --- */

        /* Glassmorphism Top Bar */
        .top-bar {
            background: rgba(255, 255, 255, 0.8); height: 80px; display: flex; align-items: center;
            justify-content: center; position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0 20px; transition: all 0.3s ease;
        }

        .menu-btn { 
            position: absolute; left: 20px; cursor: pointer; color: var(--primary); 
            background: var(--bg); padding: 10px; border-radius: 12px; transition: 0.3s;
            box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: center;
        }
        .menu-btn:hover { background: var(--primary); color: white; transform: scale(1.05); }
        
        .theme-toggle-btn {
            position: absolute; right: 20px; cursor: pointer; color: var(--primary); 
            background: var(--bg); padding: 10px; border-radius: 12px; transition: 0.3s;
            box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle-btn:hover { background: var(--primary); color: white; transform: scale(1.05); }
        
        .app-name {
            font-size: clamp(1.5rem, 6vw, 2.2rem); font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center; letter-spacing: -0.5px;
        }

        /* Sidebar Styling */
        .sidebar {
            position: fixed; left: -100%; top: 0; width: 300px; height: 100%;
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-light) 100%); 
            color: white; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001; padding-top: 25px; box-shadow: 15px 0 40px rgba(0,0,0,0.4);
            overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 0 25px 25px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-item { 
            padding: 16px 25px; display: flex; align-items: center; cursor: pointer; 
            transition: all 0.3s ease; color: #cbd5e1; font-weight: 500; font-size: 1.05rem;
            position: relative; overflow: hidden;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.05); color: var(--accent); padding-left: 32px; border-left: 4px solid var(--accent); }
        .sidebar-item .material-icons { margin-right: 18px; font-size: 22px; transition: 0.3s; }
        .sidebar-item:hover .material-icons { transform: scale(1.1); color: var(--accent); }

        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); display: none; z-index: 1000; backdrop-filter: blur(5px); transition: 0.3s; }
        .overlay.active { display: block; }

        .container { padding: 25px 20px; max-width: 1200px; margin: 0 auto; width: 100%; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }

        /* Premium Cards */
        .card, .table-card { 
            background: var(--white); border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-md); border: 1px solid rgba(226, 232, 240, 0.8); 
            overflow: hidden; width: 100%; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .card:hover, .table-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: rgba(203, 213, 225, 0.8); }
        .card-header { padding: 20px 24px; background: #ffffff; font-weight: 700; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; font-size: 1.1rem; }
        .card-body { padding: 24px; }

        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; font-size: 0.95rem; }
        th { background-color: #f8fafc; color: #475569; font-weight: 700; padding: 18px 20px; border-bottom: 2px solid var(--table-border); white-space: nowrap; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; color: #334155; transition: 0.2s; }
        tr:hover td { background-color: #f8fafc; color: var(--primary); }

        /* Enhanced Balance Card */
        .balance-card { 
            background: linear-gradient(135deg, var(--primary) 0%, #1e293b 100%); 
            color: white; padding: 35px; border-radius: var(--radius-lg); margin-bottom: 30px; 
            text-align: center; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.25); 
            position: relative; overflow: hidden;
        }
        .balance-card::before {
            content: ''; position: absolute; top: -50px; right: -50px; width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(251,191,36,0.15) 0%, transparent 70%); border-radius: 50%;
        }

        .actions { display: flex; gap: 12px; justify-content: center; }
        .actions .material-icons { font-size: 20px; cursor: pointer; padding: 8px; border-radius: 10px; transition: all 0.2s ease; }
        .icon-edit { color: #3b82f6; background: #eff6ff; }
        .icon-edit:hover { background: #3b82f6; color: white; transform: scale(1.1); box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
        .icon-delete { color: var(--danger); background: #fef2f2; }
        .icon-delete:hover { background: var(--danger); color: white; transform: scale(1.1); box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }

        /* Premium Modals & Forms */
        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -45%) scale(0.95); 
            background: white; padding: 35px; border-radius: var(--radius-lg); width: 95%; max-width: 480px; 
            z-index: 1002; display: none; max-height: 90vh; overflow-y: auto; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.3); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .modal.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 600; color: #475569; font-size: 0.95rem; }
        .form-group input, .form-group select { 
            width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: var(--radius-md); 
            outline: none; transition: all 0.3s ease; font-family: inherit; font-size: 1rem; background: #f8fafc;
        }
        .form-group input:focus, .form-group select:focus { 
            border-color: var(--accent); background: white; box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.15); 
        }
        
        .btn-submit { 
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); 
            color: white; border: none; border-radius: var(--radius-md); cursor: pointer; 
            font-weight: 700; font-size: 1.05rem; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2); 
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(15, 23, 42, 0.3); background: linear-gradient(135deg, var(--primary-light), var(--primary)); }

        .comparison-box { margin-top: 15px; padding: 15px; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; font-size: 0.9rem; line-height: 1.6; }

        /* Custom Toast Notification Style */
        .toast-container { position: fixed; bottom: 25px; right: 25px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; }
        .toast { 
            background: white; color: var(--primary); padding: 16px 24px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 12px; 
            opacity: 0; transform: translateX(50px); animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            font-weight: 600; font-size: 0.95rem; border-left: 5px solid;
        }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }
        .toast span.material-icons.success-icon { color: var(--success); }
        .toast span.material-icons.error-icon { color: var(--danger); }
        @keyframes slideInRight { to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeOutRight { to { opacity: 0; transform: translateX(50px); } }

        /* Custom Confirm Modal Style */
        .confirm-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); z-index: 10001; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .confirm-modal.active { display: flex; animation: fadeIn 0.3s ease; }
        .confirm-box { background: white; padding: 30px; border-radius: var(--radius-lg); max-width: 380px; width: 90%; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); transform: scale(0.9); animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popUp { to { transform: scale(1); } }
        .confirm-box h3 { margin-bottom: 20px; color: var(--primary); font-size: 1.3rem; }
        .confirm-btns { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }
        .confirm-btns button { padding: 12px 24px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; flex: 1; transition: 0.3s; font-size: 1rem; }
        .btn-yes { background: var(--danger); color: white; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .btn-yes:hover { background: #dc2626; transform: translateY(-2px); }
        .btn-no { background: #f1f5f9; color: var(--primary); }
        .btn-no:hover { background: #e2e8f0; transform: translateY(-2px); }

        @media print { .top-bar, .sidebar, .no-print, .actions, .toast-container { display: none !important; } .container { padding: 0; } .table-card { border: 1px solid #eee; box-shadow: none; } body{background:white;} }
        
        /* --- Dark Mode Variables & Overrides --- */
        body.dark-theme {
            --primary: #f8fafc;
            --primary-light: #cbd5e1;
            --bg: #0f172a;
            --white: #1e293b;
            --table-border: #334155;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 10px 25px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 40px -5px rgba(0, 0, 0, 0.6), 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }
        body.dark-theme .top-bar { background: rgba(30, 41, 59, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        body.dark-theme .card-header, body.dark-theme th { background-color: var(--white); color: #f8fafc; border-color: var(--table-border); }
        body.dark-theme td { border-color: var(--table-border); color: #cbd5e1; }
        body.dark-theme tr:hover td { background-color: #0f172a; color: var(--accent); }
        body.dark-theme .form-group label { color: #cbd5e1; }
        body.dark-theme .form-group input, body.dark-theme .form-group select { background: #0f172a; border-color: var(--table-border); color: white; }
        body.dark-theme .modal, body.dark-theme .confirm-box { background: var(--white); }
        body.dark-theme .toast { background: var(--white); color: var(--primary); }
        body.dark-theme .btn-no { background: #0f172a; color: #f8fafc; }
        body.dark-theme .btn-no:hover { background: #334155; }
        body.dark-theme .loader-overlay { background: rgba(15, 23, 42, 0.9); }
        
        /* Overrides for hardcoded inline JS styles */
        body.dark-theme [style*="background:#fff"], 
        body.dark-theme [style*="background:#ffffff"], 
        body.dark-theme [style*="background:white"] { background-color: var(--white) !important; color: var(--primary) !important; border-color: var(--table-border) !important; }
        body.dark-theme [style*="background:#f1f5f9"] { background-color: #334155 !important; color: #f8fafc !important; }
        body.dark-theme [style*="background:#f8fafc"] { background-color: #0f172a !important; border-color: var(--table-border) !important; }
        body.dark-theme [style*="background:#fafaf9"] { background-color: #1e293b !important; border-color: var(--table-border) !important; }
        body.dark-theme [style*="color:#64748b"] { color: #94a3b8 !important; }
        body.dark-theme [style*="color:#475569"] { color: #cbd5e1 !important; }
        body.dark-theme [style*="border:1px solid #e2e8f0"], 
        body.dark-theme [style*="border-bottom:1px solid #f1f5f9"], 
        body.dark-theme [style*="border:2px solid #e2e8f0"] { border-color: var(--table-border) !important; }
        body.dark-theme .icon-edit { background: #1e3a8a; }
        body.dark-theme .icon-delete { background: #7f1d1d; }
    </style>
</head>
<body>

    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
        <h3 id="loaderText">MEHEDI HASAN</h3>
    </div>

    <div class="top-bar">
        <div class="menu-btn" onclick="toggleSidebar()"><span class="material-icons">menu</span></div>
        <div class="app-name">দৈনিক আয় -ব্যায় হিসাব</div>
        <div class="theme-toggle-btn" onclick="toggleTheme()"><span class="material-icons" id="themeIcon">dark_mode</span></div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span style="font-weight:800; color:var(--accent); font-size: 1.3rem; letter-spacing: 0.5px;">আয়-ব্যয় হিসাব</span>
            <span class="material-icons" onclick="toggleSidebar()" style="cursor:pointer; background:rgba(255,255,255,0.1); padding:5px; border-radius:8px; transition:0.3s;">close</span>
        </div>
        <div class="sidebar-item" onclick="showDashboard()"><span class="material-icons">dashboard</span>হিসাব</div>
        <div class="sidebar-item" onclick="openAddDataModal()"><span class="material-icons">add_circle</span>তথ্য যুক্ত করুন</div>
        <div id="dynamic-menu"></div>
        <div class="sidebar-item" onclick="showReportUI()"><span class="material-icons">settings</span>সেটিংস</div>
        <div class="sidebar-item" onclick="showTerms()"><span class="material-icons">policy</span>নীতিমালা ও শর্তাবলী</div>
    </div>

    <div class="overlay" id="overlay" onclick="closeEverything()"></div>
    <div class="container" id="main-content"></div>

    <div class="modal" id="addModal">
        <h3 id="modalTitle" style="margin-bottom:25px; text-align:center; color:var(--primary); font-size:1.4rem;">নতুন তথ্য যুক্ত করুন</h3>
        <input type="hidden" id="editRowIndex">
        <div class="form-group">
            <label>ক্যাটাগরি সিলেক্ট করুন</label>
            <select id="sheetSelector" onchange="generateFormFields()"></select>
        </div>
        <div id="dynamicFields"></div>
        <button class="btn-submit" onclick="saveData()">সেভ করুন</button>
        <button onclick="closeModal()" style="width:100%; margin-top:15px; padding: 12px; border:none; background:#f1f5f9; border-radius: 10px; color:#475569; font-weight: 600; cursor:pointer; transition: 0.3s;">ফিরে যান</button>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-box">
            <h3 id="confirmMsg">আপনি কি নিশ্চিত?</h3>
            <p style="color: #64748b; font-size: 0.95rem; margin-bottom: 10px;">এই পরিবর্তনটি আর ফিরিয়ে আনা যাবে না।</p>
            <div class="confirm-btns">
                <button class="btn-no" onclick="closeConfirm(false)">না</button>
                <button class="btn-yes" onclick="closeConfirm(true)">হ্যাঁ, মুছে ফেলুন</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx4bBloAIUlw_2WJWhGYF3A3i4KjjhVfhh-Zj_ue9SRL_DRB4Ey56Q_Li4PjsgMWwTa/exec';

        let appData = {};
        let appConfig = {};
        let sheetNamesList = [];

        const bnMonthsList = ['জানুয়ারি', 'ফেব্রুয়ারি', 'মার্চ', 'এপ্রিল', 'মে', 'জুন', 'জুলাই', 'আগস্ট', 'সেপ্টেম্বর', 'অক্টোবর', 'নভেম্বর', 'ডিসেম্বর'];
        const enToBnNum = (numStr) => String(numStr).split('').map(c => ({'0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯'}[c] || c)).join('');

        const parseYearMonth = (dateVal) => {
            if (!dateVal) return { year: null, month: null };
            let str = String(dateVal).trim();
            let d = new Date(str);
            if (!isNaN(d.getTime())) return { year: d.getFullYear(), month: d.getMonth() + 1 };
            
            let parts = str.split(/[\/\-\.]/);
            if (parts.length >= 3) {
                if (parts[0].length === 4) return { year: parseInt(parts[0]), month: parseInt(parts[1]) }; 
                if (parts[2].length === 4) {
                    let p1 = parseInt(parts[0]), p2 = parseInt(parts[1]);
                    return { year: parseInt(parts[2]), month: p1 > 12 ? p2 : p1 }; 
                }
            }
            return { year: null, month: null };
        };

        function showLoader(text = "তথ্য আপডেট হচ্ছে...") { 
            document.getElementById('loaderText').innerText = text;
            document.getElementById('loader').style.display = 'flex'; 
        }
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }
        
        // --- Updated Custom Toast Notification System ---
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let iconClass = type === 'error' ? 'error-icon' : 'success-icon';
            let iconName = type === 'error' ? 'error' : 'check_circle';
            toast.innerHTML = `<span class="material-icons ${iconClass}">${iconName}</span> <span>${msg}</span>`;
            container.appendChild(toast);

        async function loadAppData() {
            showLoader("দৈনিক আয়-ব্যয় হিসাব");
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                sheetNamesList = data.sheetNames;
                appConfig = data.config;
                appData = data.data;
                generateMenu();
                showDashboard();

                showToast('ডেটা লোড করতে ব্যর্থ!', 'error');

        function generateMenu() {
            const menu = document.getElementById('dynamic-menu');
            menu.innerHTML = sheetNamesList.map(name => 
                `<div class="sidebar-item" onclick="showSheet('${name}')"><span class="material-icons">folder</span>${name}</div>`
            ).join('');
            document.getElementById('sheetSelector').innerHTML = sheetNamesList.map(n => `<option value="${n}">${n}</option>`).join('');
        }

        function calculateTotal(sheetName, filterCurrentMonth = false) {
            let currentData = appData[sheetName] || [];
            
            if (filterCurrentMonth) {
                const now = new Date();
                const currentYear = now.getFullYear();
                const currentMonth = now.getMonth() + 1;
                
                currentData = currentData.filter(d => {
                    let dateKey = Object.keys(d).find(k => k.trim() === 'তারিখ' || k.toLowerCase().includes('date')) || 'তারিখ';
                    let ym = parseYearMonth(d[dateKey]);
                    return ym.year === currentYear && ym.month === currentMonth;
                });
            }

            let amountKey = "টাকার পরিমাণ";
            if(appConfig[sheetName]) {
                let found = appConfig[sheetName].find(c => c.name.includes('টাকা') || c.name.includes('পরিমাণ'));
                if(found) amountKey = found.name;
            }
            return currentData.reduce((acc, curr) => {
                let val = String(curr[amountKey] || 0).replace(/[৳,]/g, '').trim();
                return acc + (parseFloat(val) || 0);
            }, 0);
        }

        // --- Premium Analytics Engine using Chart.js ---
        function renderAnalyticsCharts() {
            if(typeof Chart === 'undefined') return;

            // Chart Defaults for Premium Look
            Chart.defaults.font.family = "'Noto Sans Bengali', sans-serif";
            Chart.defaults.color = document.body.classList.contains('dark-theme') ? '#cbd5e1' : '#64748b';
            Chart.defaults.plugins.tooltip.backgroundColor = 'rgba(15, 23, 42, 0.9)';
            Chart.defaults.plugins.tooltip.padding = 12;
            Chart.defaults.plugins.tooltip.cornerRadius = 8;
            Chart.defaults.plugins.tooltip.titleFont = { size: 14, weight: 'bold' };

            // Destroy existing charts to prevent duplication bugs
            if(window.overviewChartInst) window.overviewChartInst.destroy();
            if(window.expensePieChartInst) window.expensePieChartInst.destroy();
            if(window.ratioDoughnutInst) window.ratioDoughnutInst.destroy();

            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth() + 1;

            // Automatically find income and expense sheets flexibly
            let incSheetName = sheetNamesList.find(n => n.includes('আয়') || n.includes('Income')) || 'আয়ের হিসাব ';
            let expSheetName = sheetNamesList.find(n => n.includes('ব্যয়') || n.includes('Expense')) || 'দৈনিক ব্যয় হিসাব ';

            let incomeDataRaw = appData[incSheetName] || [];
            let expenseDataRaw = appData[expSheetName] || [];

            // Helper functions
            const getAmount = (item, sName) => {
                let amtKey = "টাকার পরিমাণ";
                if(appConfig[sName]) {
                    let found = appConfig[sName].find(c => c.name.includes('টাকা') || c.name.includes('পরিমাণ'));
                    if(found) amtKey = found.name;
                }
                return parseFloat(String(item[amtKey] || 0).replace(/[৳,]/g, '').trim()) || 0;
            };
            const getDateVal = (item) => {
                let dateKey = Object.keys(item).find(k => k.trim() === 'তারিখ' || k.toLowerCase().includes('date')) || 'তারিখ';
                return item[dateKey];
            };

            // Prepare Daily Data array for current month
            let dailyData = {};
            let daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
            for(let i=1; i<=daysInMonth; i++) {
                let dayKey = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                dailyData[dayKey] = { income: 0, expense: 0 };
            }

            let totalTxCount = 0;
            let maxDailyInc = 0;
            let maxDailyExp = 0;

            const processStats = (dataList, sName, type) => {
                dataList.forEach(item => {
                    let dVal = getDateVal(item);
                    let ym = parseYearMonth(dVal);
                    if (ym.year === currentYear && ym.month === currentMonth) {
                        let parsedDate = new Date(dVal);
                        if(!isNaN(parsedDate)) {
                            let dayKey = `${parsedDate.getFullYear()}-${String(parsedDate.getMonth()+1).padStart(2,'0')}-${String(parsedDate.getDate()).padStart(2,'0')}`;
                            if(dailyData[dayKey]) {
                                let amt = getAmount(item, sName);
                                dailyData[dayKey][type] += amt;
                                totalTxCount++;
                            }
                        }
                    }
                });
            };

            processStats(incomeDataRaw, incSheetName, 'income');
            processStats(expenseDataRaw, expSheetName, 'expense');

            let chartLabels = [];
            let chartIncData = [];
            let chartExpData = [];

            Object.keys(dailyData).sort().forEach(key => {
                let dayNum = key.split('-')[2];
                chartLabels.push(dayNum + ' ' + bnMonthsList[currentMonth-1].substring(0,3));
                chartIncData.push(dailyData[key].income);
                chartExpData.push(dailyData[key].expense);
                if(dailyData[key].income > maxDailyInc) maxDailyInc = dailyData[key].income;
                if(dailyData[key].expense > maxDailyExp) maxDailyExp = dailyData[key].expense;
            });

            // Update Stats UI
            document.getElementById('statTotalTx').innerText = enToBnNum(totalTxCount);
            document.getElementById('statMaxIncome').innerText = '৳' + maxDailyInc.toLocaleString('bn-BD');
            document.getElementById('statMaxExpense').innerText = '৳' + maxDailyExp.toLocaleString('bn-BD');

            // 1. Overview Area Chart
            const ctxOverview = document.getElementById('overviewChart').getContext('2d');
            let gradientInc = ctxOverview.createLinearGradient(0, 0, 0, 400);
            gradientInc.addColorStop(0, 'rgba(16, 185, 129, 0.4)');
            gradientInc.addColorStop(1, 'rgba(16, 185, 129, 0.0)');
            
            let gradientExp = ctxOverview.createLinearGradient(0, 0, 0, 400);
            gradientExp.addColorStop(0, 'rgba(239, 68, 68, 0.4)');
            gradientExp.addColorStop(1, 'rgba(239, 68, 68, 0.0)');

            window.overviewChartInst = new Chart(ctxOverview, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [
                        {
                            label: 'আয় (Income)',
                            data: chartIncData,
                            borderColor: '#10b981',
                            backgroundColor: gradientInc,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 3,
                            pointHoverRadius: 6,
                            borderWidth: 3
                        },
                        {
                            label: 'ব্যয় (Expense)',
                            data: chartExpData,
                            borderColor: '#ef4444',
                            backgroundColor: gradientExp,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 3,
                            pointHoverRadius: 6,
                            borderWidth: 3
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 10, font: {weight: 'bold'} } } 
                    },
                    scales: {
                        x: { grid: { display: false } },
                        y: { border: { dash: [4, 4] }, grid: { color: document.body.classList.contains('dark-theme') ? '#334155' : '#e2e8f0', tickLength: 0 }, beginAtZero: true }
                    }
                }
            });

            // 2. Expense Categories Pie Chart
            let expCategoryData = {};
            let catKey = "বিবরণ"; 
            if(appConfig[expSheetName]) {
                let foundCat = appConfig[expSheetName].find(c => c.name.includes('বিবরণ') || c.name.includes('খাত') || c.name.includes('নাম'));
                if(foundCat) catKey = foundCat.name;
            }

            expenseDataRaw.forEach(item => {
                let ym = parseYearMonth(getDateVal(item));
                if (ym.year === currentYear && ym.month === currentMonth) {
                    let cat = item[catKey] || 'অন্যান্য';
                    expCategoryData[cat] = (expCategoryData[cat] || 0) + getAmount(item, expSheetName);
                }
            });

            let pieLabels = Object.keys(expCategoryData);
            let pieData = pieLabels.map(k => expCategoryData[k]);
            
            const ctxPie = document.getElementById('expensePieChart').getContext('2d');
            window.expensePieChartInst = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: pieLabels.length ? pieLabels : ['কোনো ডেটা নেই'],
                    datasets: [{
                        data: pieData.length ? pieData : [1],
                        backgroundColor: pieData.length ? ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#64748b'] : ['#e2e8f0'],
                        borderWidth: 2, borderColor: document.body.classList.contains('dark-theme') ? '#1e293b' : '#ffffff', hoverOffset: 8
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { boxWidth: 12, usePointStyle: true } } },
                    cutout: '65%'
                }
            });

            // 3. Income vs Expense Ratio Doughnut
            let totalMInc = chartIncData.reduce((a,b)=>a+b,0);
            let totalMExp = chartExpData.reduce((a,b)=>a+b,0);
            const ctxRatio = document.getElementById('ratioDoughnutChart').getContext('2d');
            window.ratioDoughnutInst = new Chart(ctxRatio, {
                type: 'pie',
                data: {
                    labels: ['মোট আয়', 'মোট ব্যয়'],
                    datasets: [{
                        data: (totalMInc === 0 && totalMExp === 0) ? [1] : [totalMInc, totalMExp],
                        backgroundColor: (totalMInc === 0 && totalMExp === 0) ? ['#e2e8f0'] : ['#10b981', '#ef4444'],
                        borderWidth: 2, borderColor: document.body.classList.contains('dark-theme') ? '#1e293b' : '#ffffff', hoverOffset: 8
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 15, usePointStyle: true, font:{size: 13, weight:'bold'} } } }
                }
            });
        }
        // --- End Analytics Engine ---

        function filterSheetData(name) {
            const sDateStr = document.getElementById('searchDate').value;
            let data = [...(appData[name] || [])].sort((a, b) => new Date(b["তারিখ"]) - new Date(a["তারিখ"]));
            
            if (sDateStr) {
                const sDate = new Date(sDateStr);
                data = data.filter(item => {
                    let dateKey = Object.keys(item).find(k => k.trim() === 'তারিখ' || k.toLowerCase().includes('date')) || 'তারিখ';
                    let dVal = item[dateKey];
                    if (!dVal) return false;
                    
                    let itemDate = new Date(dVal);
                    if (!isNaN(itemDate.getTime())) {
                        return itemDate.getFullYear() === sDate.getFullYear() && 
                               itemDate.getMonth() === sDate.getMonth() && 
                               itemDate.getDate() === sDate.getDate();
                    }
                    return String(dVal).includes(sDateStr) || 
                           String(dVal).includes(sDateStr.split('-').reverse().join('/')) ||
                           String(dVal).includes(sDateStr.split('-').reverse().join('-'));
                });
            }
            
            let fields = appConfig[name].map(c => c.name);
            const tbody = document.getElementById('sheetTbody');
            if(tbody) {
                tbody.innerHTML = data.map(item => `<tr>${fields.map(f => `<td>${item[f] || '-'}</td>`).join('')}
                <td class="no-print"><div class="actions">
                <span class="material-icons icon-edit" onclick="editItem('${name}', ${item._rowIndex})">edit</span>
                <span class="material-icons icon-delete" onclick="deleteItem('${name}', ${item._rowIndex})">delete</span>
                </div></td></tr>`).join('');
            }
        }

        function showSheet(name) {
            let fields = appConfig[name].map(c => c.name);

        // Google sheets data validation to dynamic fields
        function generateFormFields(prefillData = null) {
            const sheet = document.getElementById('sheetSelector').value;
            const container = document.getElementById('dynamicFields');
            const fieldsConfig = appConfig[sheet] || [];
            container.innerHTML = fieldsConfig.map(f => {
                let val = prefillData ? (prefillData[f.name] || '') : '';
                if(f.type === 'date' && !val && !prefillData) val = new Date().toISOString().split('T')[0];
                
                return `<div class="form-group"><label>${f.name}</label>
                ${(f.type === 'dropdown' || f.type === 'select') && f.options ? 
                `<select id="field_${f.name}">${f.options.map(opt => `<option value="${opt}" ${val === opt ? 'selected' : ''}>${opt}</option>`).join('')}</select>` : 
                `<input type="${f.type || 'text'}" id="field_${f.name}" value="${val}">`}</div>`;
            }).join('');
        }

        async function saveData() {
            const sheet = document.getElementById('sheetSelector').value;
            const editRowIndex = document.getElementById('editRowIndex').value;
            let newData = {};
            appConfig[sheet].forEach(f => { newData[f.name] = document.getElementById(`field_${f.name}`).value; });
            closeModal();
            showLoader("সেভ হচ্ছে...");
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: editRowIndex ? 'EDIT' : 'ADD', sheetName: sheet, data: newData, rowIndex: editRowIndex ? parseInt(editRowIndex) : null })});
                await loadAppData(); 
                showToast("সফলভাবে সেভ হয়েছে", "success");
            } catch (err) { 
                showToast('ত্রুটি হয়েছে', 'error');

            hideLoader();

            showLoader("মুছে ফেলা হচ্ছে...");

                await loadAppData();
                showSheet(sheetName);

                showToast('ত্রুটি হয়েছে', 'error'); 
            }
            hideLoader();

        // --- Export and Import JSON functions ---
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "amar_hisab_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            showToast("ডেটা ডাউনলোড সফল হয়েছে", "success");
        }

        async function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    let addedCount = 0;
                    showLoader("ডেটা ইমপোর্ট হচ্ছে... দয়া করে অপেক্ষা করুন");
                    
                    for (const sheetName in importedData) {
                        if (appData[sheetName]) {
                            const existingData = appData[sheetName];
                            const newDataItems = importedData[sheetName];
                            
                            for (const newItem of newDataItems) {
                                let isDuplicate = existingData.some(existingItem => {
                                    let match = true;
                                    for (const key in newItem) {
                                        if (key !== '_rowIndex' && newItem[key] !== existingItem[key]) {
                                            match = false;
                                            break;
                                        }
                                    }
                                    return match;
                                });
                                
                                if (!isDuplicate) {
                                    await fetch(SCRIPT_URL, { 
                                        method: 'POST', 
                                        body: JSON.stringify({ action: 'ADD', sheetName: sheetName, data: newItem })
                                    });
                                    addedCount++;
                                }
                            }
                        }
                    }
                    
                    if(addedCount > 0) {
                        await loadAppData(); 
                    } else {
                        hideLoader();
                    }
                    showToast(`সফলভাবে ${addedCount} টি নতুন তথ্য যুক্ত হয়েছে`, "success");
                } catch (err) {
                    hideLoader();
                    showToast('ফাইল ইমপোর্ট করতে সমস্যা হয়েছে', 'error');
                }
            };
            reader.readAsText(file);
        }

        function generateReport() {
            const val = document.getElementById('repMonth').value;

            if(!val) { showToast('দয়া করে মাস নির্বাচন করুন', 'error'); return; }
            const [yearStr, monthStr] = val.split('-');
            const targetYear = parseInt(yearStr);
            const targetMonth = parseInt(monthStr);
            
            const prevDate = new Date(targetYear, targetMonth - 2, 1);
            const prevYear = prevDate.getFullYear();
            const prevMonth = prevDate.getMonth() + 1;

            const targetMonthBn = bnMonthsList[targetMonth - 1];
            const targetYearBn = enToBnNum(targetYear);

            let html = `<div style="text-align:center; margin-bottom:35px; background:white; padding:40px; border-radius:20px; border:1px solid #e2e8f0; box-shadow:var(--shadow-md);">

                            <p style="font-weight:700; color:var(--accent); margin-top:15px; font-size:0.9rem; letter-spacing:1px; text-transform:uppercase;">ডেভেলপার: মেহেদী হাসান</p>
                        </div>`;
            
            let totalFound = 0;
            let currentMonthGrandTotal = 0;
            let prevMonthGrandTotal = 0;

            let sheetsToProcess = selectedSheet === 'ALL' ? sheetNamesList : [selectedSheet];

            sheetsToProcess.forEach(name => {
                let dataList = appData[name] || [];
                if (dataList.length === 0) return;

                let headers = appConfig[name] ? appConfig[name].map(c => c.name) : Object.keys(dataList[0]).filter(k => k !== '_rowIndex');
                
                let dateKey = headers.find(h => h.trim() === 'তারিখ' || h.toLowerCase().includes('date'));
                if (!dateKey) dateKey = Object.keys(dataList[0]).find(k => k.trim() === 'তারিখ' || k.toLowerCase().includes('date')) || 'তারিখ';

                let amtKey = headers.find(h => h.includes('টাকা') || h.includes('পরিমাণ') || h.toLowerCase().includes('amount'));
                if (!amtKey) amtKey = Object.keys(dataList[0]).find(k => k.includes('টাকা') || k.includes('পরিমাণ')) || headers[1];

                let filtered = dataList.filter(d => {
                    let ym = parseYearMonth(d[dateKey]);
                    return ym.year === targetYear && ym.month === targetMonth;
                });

                let prevFiltered = dataList.filter(d => {
                    let ym = parseYearMonth(d[dateKey]);
                    return ym.year === prevYear && ym.month === prevMonth;
                });

                if(filtered.length > 0 || prevFiltered.length > 0) {
                    let sheetTotal = filtered.reduce((sum, r) => sum + (parseFloat(String(r[amtKey] || 0).replace(/[৳,]/g, '')) || 0), 0);
                    let prevSheetTotal = prevFiltered.reduce((sum, r) => sum + (parseFloat(String(r[amtKey] || 0).replace(/[৳,]/g, '')) || 0), 0);

                                </div>
                            </div>
                            <div class="table-responsive">
                                <table>
                                    <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>

        // --- Theme Toggle Logic ---
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark-theme');
            const themeIcon = document.getElementById('themeIcon');
            const isDark = body.classList.contains('dark-theme');
            
            if (isDark) {
                themeIcon.innerText = 'light_mode';
                localStorage.setItem('theme', 'dark');
                if(typeof Chart !== 'undefined') Chart.defaults.color = '#cbd5e1';
            } else {
                themeIcon.innerText = 'dark_mode';
                localStorage.setItem('theme', 'light');
                if(typeof Chart !== 'undefined') Chart.defaults.color = '#64748b';
            }
            
            // Re-render charts if they exist on the current view to apply new theme colors
            if(document.getElementById('overviewChart') && typeof renderAnalyticsCharts === 'function') {
                renderAnalyticsCharts();
            }
        }

        // Initialize Theme on Load
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-theme');
                const themeIcon = document.getElementById('themeIcon');
                if(themeIcon) themeIcon.innerText = 'light_mode';
                if(typeof Chart !== 'undefined') Chart.defaults.color = '#cbd5e1';
            }
        });
    </script>
